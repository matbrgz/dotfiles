<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#34d399" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#34d399" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="256" x2="1024" y2="256"/>
    <line x1="0" y1="512" x2="1024" y2="512"/>
    <line x1="0" y1="768" x2="1024" y2="768"/>
    <line x1="256" y1="0" x2="256" y2="1024"/>
    <line x1="512" y1="0" x2="512" y2="1024"/>
    <line x1="768" y1="0" x2="768" y2="1024"/>
  </g>

  <!-- Terminal window frame -->
  <rect x="140" y="200" width="744" height="520" rx="24" ry="24" fill="#141420" stroke="#252540" stroke-width="2"/>

  <!-- Title bar -->
  <rect x="140" y="200" width="744" height="56" rx="24" ry="24" fill="#1e1e30"/>
  <rect x="140" y="232" width="744" height="24" fill="#1e1e30"/>

  <!-- Traffic lights -->
  <circle cx="200" cy="228" r="12" fill="#ff5f57"/>
  <circle cx="240" cy="228" r="12" fill="#ffbd2e"/>
  <circle cx="280" cy="228" r="12" fill="#28ca41"/>

  <!-- Prompt line 1: dotfiles -->
  <text x="184" y="318" font-family="'SF Mono', 'Fira Code', monospace" font-size="38" fill="#34d399" filter="url(#shadow)">~</text>
  <text x="218" y="318" font-family="'SF Mono', 'Fira Code', monospace" font-size="38" fill="#555570"> ❯ </text>
  <text x="310" y="318" font-family="'SF Mono', 'Fira Code', monospace" font-size="38" fill="#e2e2e6">dotfiles</text>

  <!-- Prompt line 2: sync -->
  <text x="184" y="390" font-family="'SF Mono', 'Fira Code', monospace" font-size="38" fill="#34d399">~</text>
  <text x="218" y="390" font-family="'SF Mono', 'Fira Code', monospace" font-size="38" fill="#555570"> ❯ </text>
  <text x="310" y="390" font-family="'SF Mono', 'Fira Code', monospace" font-size="38" fill="#909098">sync </text>
  <text x="426" y="390" font-family="'SF Mono', 'Fira Code', monospace" font-size="38" fill="#34d399">✓</text>

  <!-- Prompt line 3: clean -->
  <text x="184" y="462" font-family="'SF Mono', 'Fira Code', monospace" font-size="38" fill="#34d399">~</text>
  <text x="218" y="462" font-family="'SF Mono', 'Fira Code', monospace" font-size="38" fill="#555570"> ❯ </text>
  <text x="310" y="462" font-family="'SF Mono', 'Fira Code', monospace" font-size="38" fill="#909098">clean </text>
  <text x="444" y="462" font-family="'SF Mono', 'Fira Code', monospace" font-size="38" fill="#34d399">✓</text>

  <!-- Active prompt line -->
  <text x="184" y="534" font-family="'SF Mono', 'Fira Code', monospace" font-size="38" fill="#34d399" filter="url(#shadow)">~</text>
  <text x="218" y="534" font-family="'SF Mono', 'Fira Code', monospace" font-size="38" fill="#34d399" filter="url(#shadow)"> ❯ </text>
  <!-- Cursor blink -->
  <rect x="310" y="508" width="22" height="36" rx="2" fill="#34d399" opacity="0.9" filter="url(#shadow)"/>

  <!-- Bottom glow line -->
  <rect x="140" y="712" width="744" height="3" rx="1.5" fill="url(#glow)" opacity="0.6"/>
</svg>
